<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Wi-Fi Password Form</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f7f6; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .header-image {
            display: block;
            margin: 0 auto 35px auto; 
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            /* Placeholder style in case image isn't found */
            min-height: 100px;
            background-color: #eee;
            color: #777;
            line-height: 100px;
            text-align: center;
        }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Gemini Wi-Fi Password Form</h2>
    <img src="assests/geminilogo.png" alt="[Insert Your Image]" class="header-image">
    <div class="input-group">
        <label>Name of Employee</label>
        <input type="text" id="name" required>
    </div>
    
    <div class="input-group">
        <label>Department</label>
        <input type="text" id="dept" required>
    </div>
    
    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" required>
    </div>

    <button onclick="sendData()">Submit</button>
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        const url = "https://script.google.com/macros/s/AKfycbygQbwW-sTmtweC2h6fSx9z1MJw0_QghB2f9mPYWb5BhB4maP11oxyfec0sJzVst_oZng/exec";
        const status = document.getElementById('status');
        const payload = {
            name: document.getElementById('name').value,
            department: document.getElementById('dept').value,
            email: document.getElementById('email').value
        };

        if(!payload.name || !payload.department || !payload.email) {
            status.innerText = "Please fill all fields.";
            return;
        }

        status.innerText = "Sending...";
        
        try {
            await fetch(url, {
                method: 'POST',
                mode: 'no-cors', // Essential for Google Apps Script
                body: JSON.stringify(payload)
            });
            status.style.color = "green";
            status.innerText = "Form submitted successfully!";
            document.querySelectorAll('input').forEach(i => i.value = "");
        } catch (e) {
            status.style.color = "red";
            status.innerText = "Error sending form.";
        }
    }
</script>

</body>
</html>
